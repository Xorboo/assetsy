# LOCAL DEVELOPMENT compose: bot + local MongoDB + Selenium Chrome.
# Secrets come from .env (see .env.template).

services:
  mongo:
    image: mongo:7
    container_name: assetsy-mongo
    restart: unless-stopped
    ports:
      - "27018:27017" # 27018 to not clash with ObyWatcher's local mongo; inspect with Compass / mongosh
    volumes:
      - mongo_data:/data/db

  chrome:
    image: selenium/standalone-chrome:latest
    container_name: assetsy-chrome
    restart: unless-stopped
    shm_size: 2g
    ports:
      - "4444:4444" # exposed so scrapers can also be run locally against this Chrome
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  bot:
    container_name: assetsy
    build: .
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      chrome:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_USER_ID: ${TELEGRAM_ADMIN_USER_ID}
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-assetsy}
      SELENIUM_URL: http://chrome:4444/wd/hub

volumes:
  mongo_data:
